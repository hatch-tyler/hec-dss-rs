name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Full build + test with C library cross-validation (Windows only)
  build-and-test:
    name: Full Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Checkout hec-dss C library
        uses: actions/checkout@v4
        with:
          repository: HydrologicEngineeringCenter/hec-dss
          path: hec-dss-c

      - name: Build C hecdss library
        run: |
          cmake -S hec-dss-c -B hec-dss-c/build
          cmake --build hec-dss-c/build --config Release --target hecdss

      - name: Add DLL to PATH
        run: echo "${{ github.workspace }}/hec-dss-c/build/heclib/hecdss/Release" >> $env:GITHUB_PATH

      - name: Build workspace
        run: cargo build --all-features --release
        env:
          HEC_DSS_DIR: ${{ github.workspace }}/hec-dss-c

      - name: Run all tests
        run: cargo test --all-features --release
        env:
          HEC_DSS_DIR: ${{ github.workspace }}/hec-dss-c

      - name: Upload Windows DLL
        uses: actions/upload-artifact@v4
        with:
          name: dss_ffi-windows-x64
          path: target/release/dss_ffi.dll

  # Pure Rust build + unit tests on all platforms
  build-pure-rust:
    name: Pure Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build dss-core and dss-ffi (no C dependency)
        run: cargo build -p dss-core -p dss-ffi --release --no-default-features

      - name: Run dss-core unit tests (no C dependency)
        run: cargo test -p dss-core --lib --no-default-features

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: dss_ffi-${{ matrix.os }}
          path: |
            target/release/dss_ffi.dll
            target/release/libdss_ffi.so
            target/release/libdss_ffi.dylib

  # Clippy on all pure Rust crates
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy -p dss-core -p dss-ffi -- -D warnings

  # Python wheel builds
  python-wheels:
    name: Python Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --release -m crates/dss-python/Cargo.toml
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: target/wheels/*.whl
